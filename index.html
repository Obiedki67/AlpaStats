<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Alpa Site | Новостной сайт + живой рейтинг</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #e5e5e5;
        }

        .app-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 2rem;
        }

        /* модальное окно (два режима: регистрация / вход по ключу) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.25s ease;
        }
        .modal-card {
            background: #0f0f0f;
            border: 1px solid #2c2c2c;
            border-radius: 42px;
            padding: 2rem 1.8rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6);
            animation: fadeUp 0.3s ease;
        }
        .modal-card h3 {
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            color: #ff6b5c;
        }
        .modal-card p {
            color: #aaa;
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
        }
        .modal-card input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.9rem 1rem;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            margin-bottom: 0.8rem;
            outline: none;
            transition: 0.2s;
        }
        .modal-card input:focus {
            border-color: #ff6b5c;
        }
        .modal-card button {
            background: #ff6b5c;
            border: none;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: #0a0a0a;
            margin-top: 0.5rem;
        }
        .modal-card button:hover {
            background: #ff8a7c;
            transform: scale(1.02);
        }
        .modal-card .secondary-btn {
            background: transparent;
            border: 1px solid #ff6b5c;
            color: #ff6b5c;
            margin-top: 0.5rem;
        }
        .modal-card .secondary-btn:hover {
            background: #ff6b5c20;
            transform: scale(1.02);
        }
        .error-msg {
            color: #ff6b5c;
            font-size: 0.8rem;
            margin: 0.5rem 0 0.2rem;
            background: #ff6b5c10;
            padding: 0.3rem;
            border-radius: 40px;
        }
        .generated-link {
            background: #111;
            border: 1px solid #ff6b5c;
            border-radius: 60px;
            padding: 0.8rem;
            margin: 1rem 0;
            word-break: break-all;
            font-size: 0.75rem;
            font-family: monospace;
            color: #ffaa66;
        }
        .hint {
            font-size: 0.7rem;
            color: #6a6a6a;
            margin-top: 0.8rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .profile-badge {
            background: #111111;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            border: 1px solid #2c2c2c;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .nickname {
            color: #ff6b5c;
            font-weight: 600;
        }
        .server-status {
            font-size: 0.7rem;
            background: #111;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            border: 1px solid #2c2c2c;
        }
        .server-status.online { color: #6bff6b; border-color: #6bff6b40; }
        .server-status.offline { color: #ff6b5c; border-color: #ff6b5c40; }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #222;
            padding-bottom: 0.5rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: #fff; background: #1a1a1a; }
        .tab-btn.active { background: #ff6b5c20; color: #ff6b5c; border: 1px solid #ff6b5c60; }
        .tab-content { display: none; animation: fadeUp 0.35s ease; }
        .tab-content.active-content { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }

        .news-grid { display: flex; flex-direction: column; gap: 1.2rem; }
        .news-card {
            background: #0f0f0f;
            border: 1px solid #262626;
            border-radius: 28px;
            padding: 1.2rem 1.5rem;
            transition: all 0.25s;
            cursor: pointer;
        }
        .news-card:hover { border-color: #ff6b5c; transform: translateX(5px); background: #121212; }
        .news-title { font-size: 1.2rem; font-weight: 600; color: #f2f2f2; margin-bottom: 0.4rem; }
        .news-desc { color: #aaa; font-size: 0.9rem; }
        .news-date { font-size: 0.7rem; color: #ff6b5c; margin-top: 0.6rem; }

        .stats-section {
            background: #0c0c0c;
            border-radius: 28px;
            border: 1px solid #2a2a2a;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .stats-title { font-size: 1.2rem; font-weight: 500; margin-bottom: 1rem; border-left: 3px solid #ff6b5c; padding-left: 12px; }
        .category-buttons { display: flex; flex-wrap: wrap; gap: 0.7rem; margin-bottom: 1.8rem; }
        .cat-btn {
            background: #111; border: 1px solid #2c2c2c; color: #ccc; padding: 0.4rem 1.2rem;
            border-radius: 40px; cursor: pointer; transition: 0.2s;
        }
        .cat-btn.active-cat { background: #ff6b5c; border-color: #ff6b5c; color: #0a0a0a; font-weight: 500; }
        .top-list { display: flex; flex-direction: column; gap: 0.7rem; }
        .top-item {
            display: flex; align-items: center; gap: 1rem; background: #111; padding: 0.6rem 1rem;
            border-radius: 60px; border: 1px solid #252525;
        }
        .top-rank { font-weight: 700; width: 45px; color: #ff6b5c; }
        .top-name { flex: 1; color: #ddd; }
        .top-value { font-family: monospace; color: #bbb; }

        .dev-block { text-align: center; padding: 3rem 1rem; background: #0c0c0c; border-radius: 32px; border: 1px dashed #ff6b5c; }
        .settings-panel { background: #0c0c0c; border-radius: 32px; padding: 1.5rem; border: 1px solid #262626; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 0.9rem 0; border-bottom: 1px solid #222; }
        .toggle-switch {
            width: 44px; height: 24px; background: #2c2c2c; border-radius: 40px; position: relative; cursor: pointer; transition: 0.2s;
        }
        .toggle-switch.active { background: #ff6b5c; }
        .toggle-switch::after {
            content: ""; width: 20px; height: 20px; background: white; border-radius: 50%;
            position: absolute; top: 2px; left: 3px; transition: 0.2s;
        }
        .toggle-switch.active::after { left: 21px; }
        footer { margin-top: 2.5rem; text-align: center; font-size: 0.7rem; color: #4a4a4a; }
        @media (max-width: 680px) { .tab-btn { padding: 0.4rem 1rem; font-size: 0.85rem; } }
    </style>
</head>
<body>
<div class="app-container" id="app" style="display: none;">
    <div class="header">
        <div class="profile-badge"><span>🔐 аккаунт</span><span class="nickname" id="displayNickname">---</span></div>
        <div class="server-status" id="serverStatus">🔄 проверка сервера...</div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="news">📰 Новости</button>
        <button class="tab-btn" data-tab="top">🏆 Топ 10</button>
        <button class="tab-btn" data-tab="chat">💬 Чат</button>
        <button class="tab-btn" data-tab="settings">⚙️ Настройки</button>
    </div>
    <div id="newsTab" class="tab-content active-content"><div class="news-grid" id="newsContainer"></div></div>
    <div id="topTab" class="tab-content">
        <div class="stats-section">
            <div class="stats-title">📊 Рейтинги сообщества <span id="onlineBadge" style="font-size:0.7rem;"></span></div>
            <div class="category-buttons" id="categoryButtons">
                <button class="cat-btn active-cat" data-cat="kills">Убийства</button>
                <button class="cat-btn" data-cat="wins">Победы</button>
                <button class="cat-btn" data-cat="defeats">Поражения</button>
                <button class="cat-btn" data-cat="deaths">Смерти</button>
                <button class="cat-btn" data-cat="xp">Опыт</button>
            </div>
            <div id="top10List" class="top-list">Загрузка данных с сервера...</div>
        </div>
    </div>
    <div id="chatTab" class="tab-content"><div class="dev-block"><div class="dev-icon">💬</div><h3>Чат в разработке</h3><p>Скоро здесь появится возможность общаться с другими игроками.</p></div></div>
    <div id="settingsTab" class="tab-content">
        <div class="settings-panel">
            <div class="setting-item"><span>🌙 Тёмная тема</span><span style="color:#ff6b5c">minimal black</span></div>
            <div class="setting-item"><span>🔔 Уведомления</span><div class="toggle-switch active" id="notifToggle"></div></div>
            <div class="setting-item"><span>🌐 Язык</span><select id="langSelect"><option value="ru">Русский</option></select></div>
            <div class="setting-item"><span>🎮 Аккаунт: <span class="nickname" id="settingsNick"></span></span><span>✅ защищён</span></div>
        </div>
    </div>
    <footer>Alpa Site · Данные с сервера · обновление каждые 30 секунд</footer>
</div>

<!-- МОДАЛЬНОЕ ОКНО (два состояния) -->
<div id="authModal" class="modal-overlay">
    <div class="modal-card" id="modalCard">
        <!-- контент будет меняться динамически -->
    </div>
</div>

<script>
    // ======================= НАСТРОЙКИ ПОДКЛЮЧЕНИЯ =======================
    // Пробуем несколько возможных адресов сервера
    const possibleHosts = [
        window.location.hostname,
        "de3.bot-hosting.net",
        "157.90.181.183"
    ];
    const SERVER_PORT = 20003;
    let API_BASE = `http://${possibleHosts[0]}:${SERVER_PORT}/api`;
    let currentUserNick = "";
    let currentCategory = "kills";
    let isServerOnline = false;
    let updateInterval = null;
    
    // Хранилище пользователей
    let usersDB = JSON.parse(localStorage.getItem("alpa_users")) || {};
    
    // DOM-элементы
    const modal = document.getElementById('authModal');
    const modalCard = document.getElementById('modalCard');
    const appContainer = document.getElementById('app');
    const serverStatusSpan = document.getElementById('serverStatus');
    const onlineBadge = document.getElementById('onlineBadge');
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function saveUsersToLocal() {
        localStorage.setItem("alpa_users", JSON.stringify(usersDB));
    }
    
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString(16);
    }
    
    function generateLoginLink(nickname, rawPassword) {
        const passwordHash = simpleHash(rawPassword);
        return `alpalogin=${encodeURIComponent(nickname)}?${passwordHash}`;
    }
    
    function verifyPassword(nickname, passwordHash) {
        if (!usersDB[nickname]) return false;
        return usersDB[nickname].passwordHash === passwordHash;
    }
    
    function registerUser(nickname, rawPassword) {
        if (!nickname || nickname.trim() === "") return { success: false, error: "Никнейм не может быть пустым" };
        if (usersDB[nickname]) return { success: false, error: "Пользователь с таким ником уже существует" };
        if (!rawPassword || rawPassword.length < 3) return { success: false, error: "Пароль должен быть минимум 3 символа" };
        const passwordHash = simpleHash(rawPassword);
        usersDB[nickname] = { passwordHash, registered: Date.now() };
        saveUsersToLocal();
        return { success: true, nickname, passwordHash, rawPassword };
    }
    
    // ========== ПРОВЕРКА СТАТУСА СЕРВЕРА ==========
    async function findWorkingServer() {
        for (const host of possibleHosts) {
            const testUrl = `http://${host}:${SERVER_PORT}/api/top`;
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                const response = await fetch(testUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (response.ok) {
                    API_BASE = `http://${host}:${SERVER_PORT}/api`;
                    console.log("✅ Сервер найден:", API_BASE);
                    return true;
                }
            } catch(e) {}
        }
        console.log("⚠️ Сервер не найден, работаем офлайн");
        return false;
    }
    
    async function checkServerStatus() {
        if (!API_BASE) {
            isServerOnline = false;
            serverStatusSpan.innerHTML = '🔴 сервер офлайн';
            serverStatusSpan.className = 'server-status offline';
            if (onlineBadge) onlineBadge.innerHTML = '(офлайн)';
            return false;
        }
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            const response = await fetch(`${API_BASE}/top`, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (response.ok) {
                isServerOnline = true;
                serverStatusSpan.innerHTML = '🟢 сервер онлайн';
                serverStatusSpan.className = 'server-status online';
                if (onlineBadge) onlineBadge.innerHTML = '(данные с сервера)';
                return true;
            }
        } catch(e) {}
        isServerOnline = false;
        serverStatusSpan.innerHTML = '🔴 сервер офлайн (локальные данные)';
        serverStatusSpan.className = 'server-status offline';
        if (onlineBadge) onlineBadge.innerHTML = '(офлайн-режим)';
        return false;
    }
    
    // ========== ПОЛУЧЕНИЕ ТОП-ДАННЫХ (с сервера или локально) ==========
    async function fetchTopData() {
        if (isServerOnline && API_BASE) {
            try {
                const response = await fetch(`${API_BASE}/top`);
                if (response.ok) {
                    return await response.json();
                }
            } catch (e) {
                console.warn("Ошибка запроса к серверу", e);
            }
        }
        // Локальные демо-данные (только текущий игрок)
        const emptyEntry = { name: "—", value: "—" };
        const userEntry = { name: currentUserNick, value: 0 };
        const categories = ["kills", "wins", "defeats", "deaths", "xp"];
        const demoData = {};
        categories.forEach(cat => {
            const arr = [userEntry];
            for (let i = 0; i < 9; i++) arr.push({ ...emptyEntry });
            demoData[cat] = arr;
        });
        return demoData;
    }
    
    async function renderTop10(category) {
        const container = document.getElementById("top10List");
        if (!container) return;
        container.innerHTML = "⏳ Загрузка рейтинга...";
        const fullData = await fetchTopData();
        if (!fullData || !fullData[category]) {
            container.innerHTML = "❌ Не удалось загрузить данные.";
            return;
        }
        const topList = fullData[category];
        container.innerHTML = "";
        topList.slice(0, 10).forEach((player, idx) => {
            const rank = idx + 1;
            let rankColor = rank === 1 ? "#ffaa66" : (rank === 2 ? "#c0c0c0" : (rank === 3 ? "#cd7f32" : "#ff6b5c"));
            const isEmpty = player.name === "—";
            const div = document.createElement("div");
            div.className = "top-item";
            div.innerHTML = `
                <div class="top-rank" style="color:${rankColor}">#${rank}</div>
                <div class="top-name" style="${isEmpty ? 'color:#555' : ''}">${escapeHtml(player.name)}</div>
                <div class="top-value">${player.value}</div>
            `;
            container.appendChild(div);
        });
    }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // ========== НОВОСТИ ==========
    function initNews() {
        const posts = [
            { title: "🔐 Новая система входа", desc: "Теперь регистрация + персональная ссылка. Ваш аккаунт под защитой!", link: null, date: "20:00 МСК" },
            { title: "🆔 Сайт привязан к серверу! Бета тестирование началось!", desc: "Поучаствуйте в бета тесте нашего сайта! Данные синхронизируются с сервером", link: null, date: "15:00 МСК" },
            { title: "📱 Наш телеграм канал", desc: "Все новости и общение в Telegram", link: "https://t.me/alpa_amongus", date: "постоянная ссылка" },
            { title: "🎲 Список мини-игр", desc: "Прятки, Хард, Клон, Домики и другие режимы", link: "https://clck.ru/3T3oWT", date: "постоянная ссылка" }
        ];
        const container = document.getElementById('newsContainer');
        if (!container) return;
        container.innerHTML = '';
        posts.forEach(post => {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `<div class="news-title">${post.title}</div><div class="news-desc">${post.desc}</div><div class="news-date">🕒 ${post.date}</div>`;
            if (post.link) { card.style.cursor = 'pointer'; card.addEventListener('click', () => window.open(post.link, '_blank')); }
            container.appendChild(card);
        });
    }
    
    // ========== ВКЛАДКИ ==========
    function initTabs() {
        const tabs = document.querySelectorAll('.tab-btn');
        const contents = { news: document.getElementById('newsTab'), top: document.getElementById('topTab'), chat: document.getElementById('chatTab'), settings: document.getElementById('settingsTab') };
        function activateTab(tabId) {
            Object.keys(contents).forEach(id => { if (contents[id]) contents[id].classList.remove('active-content'); });
            if (contents[tabId]) contents[tabId].classList.add('active-content');
            tabs.forEach(btn => { btn.classList.remove('active'); if (btn.getAttribute('data-tab') === tabId) btn.classList.add('active'); });
            if (tabId === 'top') renderTop10(currentCategory);
        }
        tabs.forEach(btn => {
            btn.addEventListener('click', () => { const tabName = btn.getAttribute('data-tab'); if (tabName === 'news') activateTab('news'); if (tabName === 'top') activateTab('top'); if (tabName === 'chat') activateTab('chat'); if (tabName === 'settings') activateTab('settings'); });
        });
    }
    
    function initCategoryButtons() {
        const btns = document.querySelectorAll('.cat-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active-cat'));
                btn.classList.add('active-cat');
                currentCategory = btn.getAttribute('data-cat');
                renderTop10(currentCategory);
            });
        });
    }
    
    function initSettings() {
        const notifToggle = document.getElementById('notifToggle');
        const animToggle = document.getElementById('animToggle');
        if (notifToggle) notifToggle.addEventListener('click', () => notifToggle.classList.toggle('active'));
        if (animToggle) animToggle.addEventListener('click', () => animToggle.classList.toggle('active'));
    }
    
    // ========== МОДАЛЬНЫЕ ОКНА (регистрация / вход) ==========
    let currentModalMode = "register";
    
    function renderRegisterMode() {
        modalCard.innerHTML = `
            <h3>📝 Регистрация</h3>
            <p>Создайте аккаунт, чтобы получить персональную ссылку для входа</p>
            <input type="text" id="regNick" placeholder="Ваш никнейм" autocomplete="off">
            <input type="password" id="regPass" placeholder="Придумайте пароль (мин. 3 символа)">
            <div id="regError" class="error-msg"></div>
            <button id="doRegisterBtn">Зарегистрироваться</button>
            <button id="switchToLoginBtn" class="secondary-btn">🔑 У меня уже есть ключ → Войти</button>
            <div class="hint">⚡ После регистрации вы получите уникальную ссылку для входа</div>
        `;
        document.getElementById('doRegisterBtn')?.addEventListener('click', () => handleRegister());
        document.getElementById('switchToLoginBtn')?.addEventListener('click', () => { currentModalMode = "login"; renderLoginMode(); });
        document.getElementById('regNick')?.focus();
    }
    
    async function handleRegister() {
        const nick = document.getElementById('regNick')?.value.trim();
        const pass = document.getElementById('regPass')?.value;
        const errorDiv = document.getElementById('regError');
        if (!nick || !pass) {
            errorDiv.innerText = "Заполните оба поля";
            return;
        }
        const result = registerUser(nick, pass);
        if (!result.success) {
            errorDiv.innerText = result.error;
            return;
        }
        const loginLink = generateLoginLink(result.nickname, result.rawPassword);
        modalCard.innerHTML = `
            <h3>✅ Регистрация успешна!</h3>
            <p>Ваша персональная ссылка для входа (сохраните её):</p>
            <div class="generated-link" id="generatedLink">${escapeHtml(loginLink)}</div>
            <button id="copyLinkBtn">📋 Скопировать ссылку</button>
            <button id="proceedToLoginBtn" class="secondary-btn">🚀 Войти сейчас</button>
            <div class="hint">⚠️ Никому не передавайте ссылку — это ваш пароль!</div>
        `;
        document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
            navigator.clipboard.writeText(loginLink);
            const btn = document.getElementById('copyLinkBtn');
            btn.innerText = "✅ Скопировано!";
            setTimeout(() => btn.innerText = "📋 Скопировать ссылку", 2000);
        });
        document.getElementById('proceedToLoginBtn')?.addEventListener('click', () => performLoginWithKey(loginLink));
    }
    
    function renderLoginMode() {
        modalCard.innerHTML = `
            <h3>🔑 Вход по ключу</h3>
            <p>Введите вашу ссылку, полученную при регистрации</p>
            <input type="text" id="loginKeyInput" placeholder="alpalogin=ВашНик?хеш" autocomplete="off">
            <div id="loginError" class="error-msg"></div>
            <button id="doLoginBtn">Войти</button>
            <button id="switchToRegisterBtn" class="secondary-btn">📝 Нет аккаунта? Зарегистрироваться</button>
            <div class="hint">Формат: alpalogin=ИМЯ?ХЕШ_ПАРОЛЯ</div>
        `;
        document.getElementById('doLoginBtn')?.addEventListener('click', () => handleLoginWithKey());
        document.getElementById('switchToRegisterBtn')?.addEventListener('click', () => { currentModalMode = "register"; renderRegisterMode(); });
        document.getElementById('loginKeyInput')?.focus();
    }
    
    function parseKeyFromString(keyStr) {
        const regex = /alpalogin=([^?]+)\?(.+)$/i;
        const match = keyStr.match(regex);
        if (match && match[1] && match[2]) {
            return { nickname: decodeURIComponent(match[1].trim()), passwordHash: match[2].trim() };
        }
        return null;
    }
    
    async function handleLoginWithKey() {
        const rawKey = document.getElementById('loginKeyInput')?.value.trim();
        const errorDiv = document.getElementById('loginError');
        if (!rawKey) { errorDiv.innerText = "Введите ссылку для входа"; return; }
        const parsed = parseKeyFromString(rawKey);
        if (!parsed) { errorDiv.innerText = "Неверный формат ссылки"; return; }
        if (verifyPassword(parsed.nickname, parsed.passwordHash)) {
            await finalizeLogin(parsed.nickname);
        } else {
            errorDiv.innerText = "Неверный ключ или пользователь не найден";
        }
    }
    
    function performLoginWithKey(keyStr) {
        const parsed = parseKeyFromString(keyStr);
        if (parsed && verifyPassword(parsed.nickname, parsed.passwordHash)) {
            finalizeLogin(parsed.nickname);
        } else {
            alert("Ошибка входа: неверный ключ");
            renderLoginMode();
        }
    }
    
    async function finalizeLogin(nickname) {
        currentUserNick = nickname;
        modal.style.display = 'none';
        appContainer.style.display = 'block';
        document.title = `${nickname} | Alpa Site`;
        document.getElementById('displayNickname').innerText = nickname;
        document.getElementById('settingsNick').innerText = nickname;
        
        await findWorkingServer();
        await checkServerStatus();
        
        initNews();
        initTabs();
        initCategoryButtons();
        initSettings();
        await renderTop10('kills');
        
        // Автообновление каждые 30 секунд
        if (updateInterval) clearInterval(updateInterval);
        updateInterval = setInterval(async () => {
            const activeTab = document.querySelector('.tab-btn.active')?.getAttribute('data-tab');
            if (activeTab === 'top') {
                await renderTop10(currentCategory);
            }
            await checkServerStatus();
        }, 30000);
    }
    
    function checkUrlForAutoLogin() {
        const urlParams = new URLSearchParams(window.location.search);
        const keyParam = urlParams.get('key');
        if (keyParam) {
            const parsed = parseKeyFromString(keyParam);
            if (parsed && verifyPassword(parsed.nickname, parsed.passwordHash)) {
                finalizeLogin(parsed.nickname);
                return true;
            }
        }
        return false;
    }
    
    // ========== СТАРТ ==========
    window.onload = () => {
        const autoLogged = checkUrlForAutoLogin();
        if (!autoLogged) {
            currentModalMode = "register";
            renderRegisterMode();
            modal.style.display = 'flex';
            appContainer.style.display = 'none';
        }
    };
</script>
</body>
</html>
