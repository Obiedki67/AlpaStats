<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Alpa Site | Чат поддержки + Посты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #e5e5e5;
        }

        .app-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 2rem;
        }

        /* модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.25s ease;
        }
        .modal-card {
            background: #0f0f0f;
            border: 1px solid #2c2c2c;
            border-radius: 42px;
            padding: 2rem 1.8rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            animation: fadeUp 0.3s ease;
        }
        .modal-card h3 {
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            color: #ff6b5c;
        }
        .modal-card p {
            color: #aaa;
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
        }
        .modal-card input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.9rem 1rem;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            margin-bottom: 0.8rem;
            outline: none;
            transition: 0.2s;
        }
        .modal-card input:focus {
            border-color: #ff6b5c;
        }
        .modal-card button {
            background: #ff6b5c;
            border: none;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: #0a0a0a;
            margin-top: 0.5rem;
        }
        .modal-card button:hover {
            background: #ff8a7c;
            transform: scale(1.02);
        }
        .modal-card .secondary-btn {
            background: transparent;
            border: 1px solid #ff6b5c;
            color: #ff6b5c;
            margin-top: 0.5rem;
        }
        .modal-card .secondary-btn:hover {
            background: #ff6b5c20;
            transform: scale(1.02);
        }
        .error-msg {
            color: #ff6b5c;
            font-size: 0.8rem;
            margin: 0.5rem 0 0.2rem;
            background: #ff6b5c10;
            padding: 0.3rem;
            border-radius: 40px;
        }
        .generated-link {
            background: #111;
            border: 1px solid #ff6b5c;
            border-radius: 60px;
            padding: 0.8rem;
            margin: 1rem 0;
            word-break: break-all;
            font-size: 0.75rem;
            font-family: monospace;
            color: #ffaa66;
        }
        .hint {
            font-size: 0.7rem;
            color: #6a6a6a;
            margin-top: 0.8rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .profile-badge {
            background: #111111;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            border: 1px solid #2c2c2c;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .nickname {
            color: #ff6b5c;
            font-weight: 600;
        }
        .server-status {
            font-size: 0.7rem;
            background: #111;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            border: 1px solid #2c2c2c;
        }
        .server-status.online { color: #6bff6b; border-color: #6bff6b40; }
        .server-status.maintenance { color: #ffaa66; border-color: #ffaa6640; }
        .server-status.offline { color: #ff6b5c; border-color: #ff6b5c40; }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #222;
            padding-bottom: 0.5rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: #fff; background: #1a1a1a; }
        .tab-btn.active { background: #ff6b5c20; color: #ff6b5c; border: 1px solid #ff6b5c60; }
        .tab-content { display: none; animation: fadeUp 0.35s ease; }
        .tab-content.active-content { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }

        .news-grid { display: flex; flex-direction: column; gap: 1.2rem; }
        .news-card {
            background: #0f0f0f;
            border: 1px solid #262626;
            border-radius: 28px;
            padding: 1.2rem 1.5rem;
            transition: all 0.25s;
            cursor: default;
        }
        .news-card:hover {
            border-color: #ff6b5c;
            transform: translateX(5px);
            background: #121212;
        }
        .news-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f2f2f2;
            margin-bottom: 0.4rem;
        }
        .news-desc {
            color: #aaa;
            font-size: 0.9rem;
        }
        .news-date {
            font-size: 0.7rem;
            color: #ff6b5c;
            margin-top: 0.6rem;
        }

        .stats-section {
            background: #0c0c0c;
            border-radius: 28px;
            border: 1px solid #2a2a2a;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .stats-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 1rem;
            border-left: 3px solid #ff6b5c;
            padding-left: 12px;
        }
        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-bottom: 1.8rem;
        }
        .cat-btn {
            background: #111;
            border: 1px solid #2c2c2c;
            color: #ccc;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .cat-btn.active-cat {
            background: #ff6b5c;
            border-color: #ff6b5c;
            color: #0a0a0a;
            font-weight: 500;
        }
        .top-list {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }
        .top-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #111;
            padding: 0.6rem 1rem;
            border-radius: 60px;
            border: 1px solid #252525;
        }
        .top-rank {
            font-weight: 700;
            width: 45px;
            color: #ff6b5c;
        }
        .top-name {
            flex: 1;
            color: #ddd;
        }
        .top-value {
            font-family: monospace;
            color: #bbb;
        }

        .support-chat {
            background: #0c0c0c;
            border-radius: 28px;
            border: 1px solid #2a2a2a;
            padding: 1.5rem;
        }
        .support-message {
            background: #111;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid #ff6b5c;
        }
        .support-answer {
            border-left-color: #6bff6b;
            background: #1a1a1a;
        }
        .support-form {
            margin-top: 1.5rem;
        }
        .support-form textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.9rem;
            border-radius: 28px;
            color: white;
            margin-bottom: 0.8rem;
            font-family: inherit;
            resize: vertical;
        }
        .support-form button {
            background: #ff6b5c;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }
        .support-form button:hover {
            background: #ff8a7c;
        }

        .settings-panel {
            background: #0c0c0c;
            border-radius: 32px;
            padding: 1.5rem;
            border: 1px solid #262626;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 0;
            border-bottom: 1px solid #222;
        }
        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: #4a4a4a;
        }
        @media (max-width: 680px) {
            .tab-btn { padding: 0.4rem 1rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="app-container" id="app" style="display: none;">
    <div class="header">
        <div class="profile-badge"><span>🔐 аккаунт</span><span class="nickname" id="displayNickname">---</span></div>
        <div class="server-status" id="serverStatus">🔄 проверка сервера...</div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="news">📰 Новости</button>
        <button class="tab-btn" data-tab="top">🏆 Топ 10</button>
        <button class="tab-btn" data-tab="support">💬 Чат поддержки</button>
        <button class="tab-btn" data-tab="settings">⚙️ Настройки</button>
    </div>
    <div id="newsTab" class="tab-content active-content"><div class="news-grid" id="newsContainer">Загрузка новостей...</div></div>
    <div id="topTab" class="tab-content">
        <div class="stats-section">
            <div class="stats-title">📊 Рейтинги сообщества</div>
            <div class="category-buttons" id="categoryButtons">
                <button class="cat-btn active-cat" data-cat="kills">Убийства</button>
                <button class="cat-btn" data-cat="wins">Победы</button>
                <button class="cat-btn" data-cat="defeats">Поражения</button>
                <button class="cat-btn" data-cat="deaths">Смерти</button>
                <button class="cat-btn" data-cat="xp">Опыт</button>
            </div>
            <div id="top10List" class="top-list">Загрузка...</div>
        </div>
    </div>
    <div id="supportTab" class="tab-content"><div class="support-chat" id="supportChat">Загрузка...</div></div>
    <div id="settingsTab" class="tab-content">
        <div class="settings-panel">
            <div class="setting-item"><span>🌙 Тёмная тема</span><span style="color:#ff6b5c">minimal black</span></div>
            <div class="setting-item"><span>🎮 Аккаунт: <span class="nickname" id="settingsNick"></span></span><span>✅ защищён</span></div>
        </div>
    </div>
    <footer>Alpa Site · Посты создаются в админ-панели · Бан за спам</footer>
</div>

<div id="authModal" class="modal-overlay"><div class="modal-card" id="modalCard"></div></div>

<script>
    const API_BASE = "https://alpa-api.onrender.com/api";
    let currentUserNick = "";
    let currentCategory = "kills";
    let isMaintenance = false;
    let updateInterval = null;
    let usersDB = JSON.parse(localStorage.getItem("alpa_users")) || {};
    
    const modal = document.getElementById('authModal');
    const modalCard = document.getElementById('modalCard');
    const appContainer = document.getElementById('app');
    const serverStatusSpan = document.getElementById('serverStatus');
    
    // ========== ПРОВЕРКА СЕРВЕРА И ТЕХОБСЛУЖИВАНИЯ ==========
    async function checkMaintenanceAndServer() {
        try {
            const maintRes = await fetch(`${API_BASE}/maintenance`);
            if (maintRes.ok) {
                const maintData = await maintRes.json();
                isMaintenance = maintData.maintenance;
            }
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            const response = await fetch(`${API_BASE}/top`, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (response.ok) {
                if (isMaintenance) {
                    serverStatusSpan.innerHTML = '⚪ Сайт на техническом обслуживании';
                    serverStatusSpan.className = 'server-status maintenance';
                } else {
                    serverStatusSpan.innerHTML = '🟢 сервер онлайн';
                    serverStatusSpan.className = 'server-status online';
                }
                return true;
            }
        } catch (e) {}
        serverStatusSpan.innerHTML = '🔴 сервер офлайн';
        serverStatusSpan.className = 'server-status offline';
        return false;
    }
    
    // ========== ПОСТЫ (НОВОСТИ) ==========
    async function loadPosts() {
        const container = document.getElementById('newsContainer');
        if (!container) return;
        try {
            const response = await fetch(`${API_BASE}/posts`);
            const posts = await response.json();
            if (posts.length === 0) {
                container.innerHTML = '<div class="news-card"><div class="news-title">📭 Нет постов</div><div class="news-desc">Администратор скоро добавит новости.</div></div>';
                return;
            }
            container.innerHTML = '';
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div class="news-title">${escapeHtml(post.title)}</div>
                    <div class="news-desc">${escapeHtml(post.content)}</div>
                    <div class="news-date">🕒 ${post.date} — ${post.author}</div>
                `;
                container.appendChild(card);
            });
        } catch(e) {
            container.innerHTML = '<div class="news-card"><div class="news-title">❌ Ошибка загрузки</div><div class="news-desc">Не удалось загрузить новости.</div></div>';
        }
    }
    
    // ========== ТОП 10 ==========
    async function fetchTopData() {
        try {
            const response = await fetch(`${API_BASE}/top`);
            if (response.ok) return await response.json();
        } catch(e) {}
        const emptyEntry = { name: "—", value: "—" };
        const userEntry = { name: currentUserNick || "Гость", value: 0 };
        const demoData = {};
        ["kills","wins","defeats","deaths","xp"].forEach(cat => {
            demoData[cat] = [userEntry];
            for(let i=0;i<9;i++) demoData[cat].push({...emptyEntry});
        });
        return demoData;
    }
    
    async function renderTop10(category) {
        const container = document.getElementById("top10List");
        if (!container) return;
        container.innerHTML = "⏳ Загрузка...";
        const fullData = await fetchTopData();
        if (!fullData || !fullData[category]) { container.innerHTML = "❌ Нет данных"; return; }
        container.innerHTML = "";
        fullData[category].slice(0,10).forEach((player, idx) => {
            const rank = idx+1;
            let rankColor = rank===1?"#ffaa66":(rank===2?"#c0c0c0":(rank===3?"#cd7f32":"#ff6b5c"));
            const div = document.createElement("div");
            div.className = "top-item";
            div.innerHTML = `<div class="top-rank" style="color:${rankColor}">#${rank}</div><div class="top-name">${escapeHtml(player.name)}</div><div class="top-value">${player.value}</div>`;
            container.appendChild(div);
        });
    }
    
    // ========== ЧАТ ПОДДЕРЖКИ ==========
    async function loadSupportChat() {
        const container = document.getElementById("supportChat");
        if (!container) return;
        if (!currentUserNick) {
            container.innerHTML = '<p>❌ Войдите в аккаунт, чтобы писать в поддержку</p>';
            return;
        }
        try {
            const response = await fetch(`${API_BASE}/support/my`, {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: currentUserNick })
            });
            const requests = await response.json();
            if (requests.length === 0) {
                container.innerHTML = `
                    <p>📭 У вас пока нет обращений в поддержку</p>
                    <div class="support-form">
                        <textarea id="supportMessage" placeholder="Опишите вашу проблему..." rows="3"></textarea>
                        <button onclick="sendSupport()">📨 Отправить в поддержку</button>
                    </div>
                `;
            } else {
                let html = '<h3>📬 Ваши обращения</h3>';
                for (const req of requests) {
                    html += `
                        <div class="support-message ${req.status === 'answered' ? 'support-answer' : ''}">
                            <strong>#${req.id}</strong> (${req.created_at})<br>
                            <em>${escapeHtml(req.message)}</em>
                            ${req.answer ? `<br>📌 <strong>Ответ:</strong> ${escapeHtml(req.answer)} (${req.answered_at})` : '<br>⏳ Ожидает ответа...'}
                        </div>
                    `;
                }
                html += `
                    <div class="support-form" style="margin-top:20px;">
                        <textarea id="supportMessage" placeholder="Новое обращение..." rows="3"></textarea>
                        <button onclick="sendSupport()">📨 Отправить новое обращение</button>
                    </div>
                `;
                container.innerHTML = html;
            }
        } catch(e) {
            container.innerHTML = '<p>❌ Ошибка загрузки</p>';
        }
    }
    
    window.sendSupport = async function() {
        const message = document.getElementById("supportMessage")?.value.trim();
        if (!message) {
            alert("Введите сообщение");
            return;
        }
        try {
            const response = await fetch(`${API_BASE}/support/send`, {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: currentUserNick, message: message })
            });
            if (response.ok) {
                alert("✅ Сообщение отправлено! Администратор ответит в ближайшее время.");
                document.getElementById("supportMessage").value = "";
                loadSupportChat();
            } else if (response.status === 403) {
                const error = await response.json();
                alert(error.error || "❌ Вы забанены и не можете писать в поддержку");
            } else {
                alert("❌ Ошибка отправки");
            }
        } catch(e) {
            alert("❌ Ошибка соединения");
        }
    };
    
    // ========== ВКЛАДКИ ==========
    function initTabs() {
        const tabs = document.querySelectorAll('.tab-btn');
        const contents = { news: document.getElementById('newsTab'), top: document.getElementById('topTab'), support: document.getElementById('supportTab'), settings: document.getElementById('settingsTab') };
        function activateTab(tabId) {
            Object.keys(contents).forEach(id => { if(contents[id]) contents[id].classList.remove('active-content'); });
            if(contents[tabId]) contents[tabId].classList.add('active-content');
            tabs.forEach(btn => { btn.classList.remove('active'); if(btn.dataset.tab === tabId) btn.classList.add('active'); });
            if(tabId === 'top') renderTop10(currentCategory);
            if(tabId === 'support') loadSupportChat();
            if(tabId === 'news') loadPosts();
        }
        tabs.forEach(btn => {
            btn.addEventListener('click', () => { const tab = btn.dataset.tab; if(tab === 'news') activateTab('news'); if(tab === 'top') activateTab('top'); if(tab === 'support') activateTab('support'); if(tab === 'settings') activateTab('settings'); });
        });
    }
    
    function initCategoryButtons() {
        const btns = document.querySelectorAll('.cat-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active-cat'));
                btn.classList.add('active-cat');
                currentCategory = btn.dataset.cat;
                renderTop10(currentCategory);
            });
        });
    }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // ========== РЕГИСТРАЦИЯ И ВХОД ==========
    function saveUsersToLocal() { localStorage.setItem("alpa_users", JSON.stringify(usersDB)); }
    function simpleHash(str) { let hash=0; for(let i=0;i<str.length;i++){ hash=((hash<<5)-hash)+str.charCodeAt(i); hash|=0; } return hash.toString(16); }
    function generateLoginLink(nickname, rawPassword) { return `alpalogin=${encodeURIComponent(nickname)}?${simpleHash(rawPassword)}`; }
    function verifyPassword(nickname, passwordHash) { return usersDB[nickname] && usersDB[nickname].passwordHash === passwordHash; }
    function registerUser(nickname, rawPassword) {
        if(!nickname||nickname.trim()==="") return { success: false, error: "Введите никнейм" };
        if(usersDB[nickname]) return { success: false, error: "Ник уже занят" };
        if(!rawPassword||rawPassword.length<3) return { success: false, error: "Пароль минимум 3 символа" };
        usersDB[nickname] = { passwordHash: simpleHash(rawPassword), registered: Date.now() };
        saveUsersToLocal();
        return { success: true, nickname, rawPassword };
    }
    
    function renderRegisterMode() {
        modalCard.innerHTML = `<h3>📝 Регистрация</h3><p>Создайте аккаунт для входа</p><input type="text" id="regNick" placeholder="Ваш никнейм"><input type="password" id="regPass" placeholder="Пароль (мин. 3 символа)"><div id="regError" class="error-msg"></div><button id="doRegisterBtn">Зарегистрироваться</button><button id="switchToLoginBtn" class="secondary-btn">🔑 У меня есть ключ → Войти</button><div class="hint">⚡ После регистрации вы получите уникальную ссылку для входа</div>`;
        document.getElementById('doRegisterBtn')?.addEventListener('click', () => handleRegister());
        document.getElementById('switchToLoginBtn')?.addEventListener('click', () => renderLoginMode());
    }
    
    async function handleRegister() {
        const nick = document.getElementById('regNick')?.value.trim();
        const pass = document.getElementById('regPass')?.value;
        const errorDiv = document.getElementById('regError');
        if(!nick||!pass) { errorDiv.innerText = "Заполните оба поля"; return; }
        const result = registerUser(nick, pass);
        if(!result.success) { errorDiv.innerText = result.error; return; }
        const loginLink = generateLoginLink(result.nickname, result.rawPassword);
        modalCard.innerHTML = `<h3>✅ Регистрация успешна!</h3><p>Ваша ссылка для входа:</p><div class="generated-link">${escapeHtml(loginLink)}</div><button id="copyLinkBtn">📋 Скопировать</button><button id="proceedToLoginBtn" class="secondary-btn">🚀 Войти сейчас</button><div class="hint">⚠️ Никому не передавайте ссылку — это ваш пароль!</div>`;
        document.getElementById('copyLinkBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(loginLink); alert("Скопировано!"); });
        document.getElementById('proceedToLoginBtn')?.addEventListener('click', () => performLoginWithKey(loginLink));
    }
    
    function renderLoginMode() {
        modalCard.innerHTML = `<h3>🔑 Вход по ключу</h3><p>Введите ссылку, полученную при регистрации</p><input type="text" id="loginKeyInput" placeholder="alpalogin=ВашНик?хеш"><div id="loginError" class="error-msg"></div><button id="doLoginBtn">Войти</button><button id="switchToRegisterBtn" class="secondary-btn">📝 Нет аккаунта? Зарегистрироваться</button><div class="hint">Формат: alpalogin=ИМЯ?ХЕШ_ПАРОЛЯ</div>`;
        document.getElementById('doLoginBtn')?.addEventListener('click', () => handleLoginWithKey());
        document.getElementById('switchToRegisterBtn')?.addEventListener('click', () => renderRegisterMode());
    }
    
    function parseKeyFromString(keyStr) { const match = keyStr.match(/alpalogin=([^?]+)\?(.+)$/i); if(match) return { nickname: decodeURIComponent(match[1].trim()), passwordHash: match[2].trim() }; return null; }
    
    async function handleLoginWithKey() {
        const rawKey = document.getElementById('loginKeyInput')?.value.trim();
        const errorDiv = document.getElementById('loginError');
        if(!rawKey) { errorDiv.innerText = "Введите ссылку"; return; }
        const parsed = parseKeyFromString(rawKey);
        if(!parsed) { errorDiv.innerText = "Неверный формат"; return; }
        if(verifyPassword(parsed.nickname, parsed.passwordHash)) {
            await finalizeLogin(parsed.nickname);
        } else {
            errorDiv.innerText = "Неверный ключ";
        }
    }
    
    function performLoginWithKey(keyStr) {
        const parsed = parseKeyFromString(keyStr);
        if(parsed && verifyPassword(parsed.nickname, parsed.passwordHash)) {
            finalizeLogin(parsed.nickname);
        } else {
            alert("Ошибка входа");
            renderLoginMode();
        }
    }
    
    async function finalizeLogin(nickname) {
        currentUserNick = nickname;
        modal.style.display = 'none';
        appContainer.style.display = 'block';
        document.title = `${nickname} | Alpa Site`;
        document.getElementById('displayNickname').innerText = nickname;
        document.getElementById('settingsNick').innerText = nickname;
        await checkMaintenanceAndServer();
        await loadPosts();
        initTabs();
        initCategoryButtons();
        await renderTop10('kills');
        if(updateInterval) clearInterval(updateInterval);
        updateInterval = setInterval(async () => {
            const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
            if(activeTab === 'top') await renderTop10(currentCategory);
            if(activeTab === 'news') await loadPosts();
            await checkMaintenanceAndServer();
        }, 30000);
    }
    
    function checkUrlForAutoLogin() {
        const keyParam = new URLSearchParams(window.location.search).get('key');
        if(keyParam) {
            const parsed = parseKeyFromString(keyParam);
            if(parsed && verifyPassword(parsed.nickname, parsed.passwordHash)) {
                finalizeLogin(parsed.nickname);
                return true;
            }
        }
        return false;
    }
    
    window.onload = () => {
        if(!checkUrlForAutoLogin()) {
            renderRegisterMode();
            modal.style.display = 'flex';
            appContainer.style.display = 'none';
        }
    };
</script>
</body>
